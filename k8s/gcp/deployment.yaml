apiVersion: apps/v1
kind: Deployment
metadata:
  name: multicloud-app
  namespace: app
spec:
  replicas: 3
  selector:
    matchLabels: { app: multicloud-app }
  template:
    metadata:
      labels: { app: multicloud-app, cloud: gcp }
    spec:
      containers:
        - name: app
          image: multicloud-app:latest
          ports: [{ containerPort: 8000 }]
          resources:
            requests: { cpu: "250m", memory: "256Mi" }
            limits: { cpu: "500m", memory: "512Mi" }
          livenessProbe:
            httpGet: { path: /health, port: 8000 }
          env:
            - { name: CLOUD_PROVIDER, value: "gcp" }
            - { name: CLOUD_REGION, valueFrom: { configMapKeyRef: { name: cloud-config, key: region } } }
